services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=odontoflow'
      - 'POSTGRES_PASSWORD=${DB_PASSWORD:-788606}'
      - 'POSTGRES_USER=${DB_USERNAME:-postgres}'
    ports:
      - '5433:5432'

  minio:
    image: minio/minio:latest
    container_name: minio-local
    ports:
      - "9000:9000"    # API do S3
      - "9001:9001"    # Console Web
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-supersecretpassword}
    volumes:
      - minio_local_data:/data
    command: server /data --console-address ":9001"

  stripe-mock:
    image: stripe/stripe-mock:latest
    container_name: stripe-mock
    ports:
      - "12111:12111"   # HTTP
      - "12112:12112"   # HTTPS
volumes:
  minio_local_data:
