spring.application.name=odontoflow-backend

# DataSource (override via env in any real environment)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/odontoflow}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:788606}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# API
server.servlet.context-path=/api

# Springdoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# JWT — the default is a dev-only secret; ALWAYS override JWT_SECRET in production
jwt.secret=${JWT_SECRET:dev-only-secret-change-me-please-0123456789abcdef}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Billing payment provider: "fake" (default) or "stripe" (uses stripe-mock / Stripe test mode)
billing.provider=${BILLING_PROVIDER:fake}
stripe.api-key=${STRIPE_API_KEY:sk_test_123}
stripe.base-url=${STRIPE_BASE_URL:http://localhost:12111}

# Object storage (MinIO / S3) — Pre-Signed URLs
storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
storage.region=${STORAGE_REGION:us-east-1}
storage.access-key=${STORAGE_ACCESS_KEY:admin}
storage.secret-key=${STORAGE_SECRET_KEY:supersecretpassword}
storage.bucket=${STORAGE_BUCKET:odontoflow}
storage.presign-minutes=${STORAGE_PRESIGN_MINUTES:15}
